<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>LogoAnchor Taskpane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js"></script>
    <style>body { background-color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="p-4">
    <div class="mb-6"><div class="text-lg font-black text-slate-900 uppercase">LOGO<span class="text-blue-700">ANCHOR</span></div></div>
    <div class="relative mb-6">
        <input id="search-input" type="text" placeholder="e.g. nike.com" class="w-full p-3 pr-10 border border-slate-300 rounded text-sm outline-none focus:ring-2 focus:ring-blue-600">
        <button onclick="searchBrands()" class="absolute right-2 top-2 text-slate-400">🔍</button>
    </div>
    <div id="results" class="grid grid-cols-2 gap-3 overflow-y-auto max-h-[500px]"></div>
</body>
</html>
